<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasero 96 — Orçamento Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&family=Ultra&display=swap" rel="stylesheet">
<style>
  :root{
    --brasero-black:#0c0a09;
    --brasero-black-soft:#171310;
    --brasero-red:#e0231a;
    --brasero-orange:#ff7a1a;
    --brasero-yellow:#ffc42e;
    --brasero-cream:#fff6e9;
    --muted:#a89a8c;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(255,122,26,.2), transparent 60%),
      var(--brasero-black);
    color:var(--brasero-cream);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 14px 60px;
  }
  .brand{ text-align:center; margin-bottom:18px; position:relative; }
  .logo-central{
    width:110px;
    height:110px;
    display:block;
    margin:0 auto 6px;
    filter:drop-shadow(0 6px 16px rgba(255,122,26,.3));
  }
  .brand p{ margin:4px 0 0; font-size:13px; color:var(--muted); }

  .card{ position:relative; }
  .carimbo-resumo{
    position:absolute;
    width:56px; height:56px;
    top:-14px; right:-10px;
    transform:rotate(-12deg);
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.45));
    pointer-events:none;
  }

  .col{ width:100%; max-width:480px; display:flex; flex-direction:column; gap:16px; }

  .atendente-bar{
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:rgba(255,122,26,.08); border:1px solid rgba(255,122,26,.3);
    border-radius:10px; padding:8px 12px; font-size:12.5px; margin-bottom:16px;
  }
  .atendente-bar select, .atendente-bar input{
    width:auto; flex:1; max-width:180px; padding:6px 8px !important; font-size:13px;
  }

  .card{
    background:var(--brasero-black-soft);
    border:1px solid #2a2119;
    border-radius:var(--radius);
    padding:20px;
  }
  .card h2{
    font-family:'Poppins',sans-serif; font-size:15px; font-weight:700;
    color:var(--brasero-yellow); margin:0 0 12px;
  }
  label{ display:block; font-size:12.5px; font-weight:600; margin:10px 0 4px; }
  label.first{ margin-top:0; }
  input[type=text], input[type=tel], input[type=date], input[type=number], select{
    width:100%; -webkit-appearance:none; appearance:none;
    background:#0c0a09; border:1.5px solid #382c22; border-radius:9px;
    padding:9px 10px; color:var(--brasero-cream); font-family:'Inter',sans-serif;
    font-size:14px; outline:none;
  }
  input:focus, select:focus{ border-color:var(--brasero-orange); }
  .grid2{ display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:12px; }

  .cat-title{
    font-size:11.5px; text-transform:uppercase; letter-spacing:.5px;
    color:var(--brasero-orange); font-weight:700; margin:14px 0 6px;
  }
  .sabor-row{
    display:flex; justify-content:space-between; align-items:center;
    gap:10px; padding:8px 0; border-bottom:1px solid #241c15;
  }
  .sabor-row:last-child{ border-bottom:none; }
  .sabor-info{ flex:1; min-width:0; }
  .sabor-info .nome{ font-size:13.5px; font-weight:600; }
  .badge{
    display:inline-block; font-size:9px; font-weight:700; text-transform:uppercase;
    padding:2px 6px; border-radius:9px; margin-left:5px; vertical-align:middle;
  }
  .badge-basico{ background:#382c22; color:var(--muted); }
  .badge-premium{ background:linear-gradient(90deg,var(--brasero-red),var(--brasero-orange)); color:#fff; }
  .sabor-preco{ font-size:11px; color:var(--muted); }
  .qty-input{ width:56px !important; text-align:center; padding:7px 4px !important; flex-shrink:0; }

  .valor-servico-row{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    margin-top:4px;
  }
  .valor-servico-row input{ width:110px; text-align:right; }

  /* ---- resumo (pra print) ---- */
  .resumo{
    background:var(--brasero-black-soft);
    border:2px solid var(--brasero-orange);
    border-radius:var(--radius);
    padding:20px;
    position:relative;
    overflow:visible;
  }
  .resumo-header{ text-align:center; margin-bottom:14px; }
  .resumo-header .titulo{
    font-family:'Poppins',sans-serif; font-weight:800; font-size:16px;
    color:var(--brasero-yellow);
  }
  .resumo-cliente{ font-size:13px; margin-bottom:12px; line-height:1.6; }
  .resumo-cliente b{ color:var(--brasero-cream); }
  .resumo-sabores{ font-size:13px; line-height:1.8; margin-bottom:12px; }
  .resumo-sabores .linha{ display:flex; justify-content:space-between; gap:10px; }
  .resumo-sabores .linha span:first-child{ color:var(--brasero-cream); }
  .resumo-sabores .linha span:last-child{ color:var(--muted); white-space:nowrap; }
  .resumo-totais{
    border-top:1px dashed #382c22; padding-top:12px; font-size:14px;
  }
  .resumo-totais .linha{ display:flex; justify-content:space-between; margin-bottom:5px; }
  .resumo-totais .linha.total{
    margin-top:8px; padding-top:8px; border-top:1px solid #382c22;
    font-size:17px; font-weight:800; color:var(--brasero-yellow);
  }
  .disclaimer{
    text-align:center; font-size:11px; color:var(--muted); font-style:italic;
    margin-top:12px;
  }
  .vazio{ color:var(--muted); font-size:13px; text-align:center; padding:10px 0; }

  .btn-limpar{
    width:100%; margin-top:6px; background:transparent; color:var(--muted);
    border:1.5px solid #382c22; border-radius:10px; padding:11px;
    font-family:'Poppins',sans-serif; font-weight:700; font-size:13.5px; cursor:pointer;
  }
</style>
</head>
<body>

<div class="brand">
  <picture>
    <source srcset="logo.webp" type="image/webp">
    <img src="logo.png" alt="Brasero 96" class="logo-central">
  </picture>
  <p>Orçamento manual — atendimento direto</p>
</div>

<div class="col">

  <div class="atendente-bar">
    <span>👤 Quem está atendendo:</span>
    <select id="f-atendente">
      <option value="">Selecione...</option>
      <option>Jessica Nascimento</option>
      <option>Jessica Miranda</option>
      <option>Thiago Xavier</option>
      <option>Diêgo Xavier</option>
      <option value="__outro__">Outro nome...</option>
    </select>
    <input type="text" id="f-atendente-outro" placeholder="Seu nome" style="display:none;">
  </div>

  <div class="card">
    <h2>Dados do cliente</h2>
    <p style="font-size:12px; color:var(--muted); margin:0 0 10px;">Cole aqui a resposta do cliente (Nome, Telefone, Tipo de evento, Data prevista, Qtd. de pessoas, Endereço do evento).</p>
    <textarea id="f-colado" placeholder="Nome: ...&#10;Telefone: ...&#10;Tipo de evento: ...&#10;Data prevista: ...&#10;Qtd. de pessoas: ...&#10;Endereço do evento: ..." style="width:100%; min-height:130px; -webkit-appearance:none; appearance:none; background:#0c0a09; border:1.5px solid #382c22; border-radius:9px; padding:10px; color:var(--brasero-cream); font-family:'Inter',sans-serif; font-size:13.5px; outline:none; resize:vertical;"></textarea>
    <div id="previa-cliente" style="margin-top:10px; font-size:12px; color:var(--muted); line-height:1.7;"></div>
  </div>

  <div class="card">
    <h2>Cardápio</h2>
    <div id="sabores-container"></div>
    <div class="valor-servico-row">
      <label style="margin:0;">Valor do serviço</label>
      <input type="number" id="f-servico" value="600" step="10">
    </div>
  </div>

  <div class="resumo" id="resumo"></div>
  <button class="btn-limpar" id="btn-copiar" style="background:#25D366; color:#04170a; border:none;">📋 Copiar texto para WhatsApp</button>
  <p id="status-copiar" style="text-align:center; font-size:11.5px; color:var(--muted); margin:-6px 0 0;"></p>

  <button class="btn-limpar" id="btn-salvar" style="background:linear-gradient(90deg,var(--brasero-red),var(--brasero-orange)); color:#fff; border:none;">💾 Salvar no histórico</button>
  <p id="status-salvo" style="text-align:center; font-size:11.5px; color:var(--muted); margin:-6px 0 0;"></p>

  <button class="btn-limpar" id="btn-limpar">🔄 Limpar tudo (novo cliente)</button>

</div>

<script>
// Mesma URL do Apps Script já publicada no site — o script identifica
// que esse registro vem da ferramenta manual e grava na aba separada.
const SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyCbBk8-Xt_tLyM87jQVDOOEyiSbOjDu0uXLb4uuT2rL8ppUmD1247FfDVtx0AMudR1SQ/exec";

let SESSION_ID = "manual_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);

const SABORES = [
  { nome:"Lombinho Bovino", categoria:"Carne Bovina", nivel:"Básico", preco:9.00 },
  { nome:"Coração Bovino", categoria:"Carne Bovina", nivel:"Básico", preco:6.00 },
  { nome:"Cupim Bovino Tipo A", categoria:"Carne Bovina", nivel:"Básico", preco:8.00 },
  { nome:"Carne do Sol (Lombinho Bovino)", categoria:"Carne Bovina", nivel:"Básico", preco:9.00 },
  { nome:"Lombinho Bovino e Bacon intercalados", categoria:"Carne Bovina", nivel:"Básico", preco:8.00 },
  { nome:"Asa de Frango", categoria:"Frango", nivel:"Básico", preco:8.00 },
  { nome:"Coxinha da Asa (Drumette)", categoria:"Frango", nivel:"Básico", preco:8.00 },
  { nome:"Filé de Peito de Frango", categoria:"Frango", nivel:"Básico", preco:7.00 },
  { nome:"Coração de Frango", categoria:"Frango", nivel:"Básico", preco:9.00 },
  { nome:"Medalhão de Frango e Bacon", categoria:"Frango", nivel:"Básico", preco:8.00 },
  { nome:"Linguiça Mista para Churrasco", categoria:"Carne Suína", nivel:"Básico", preco:8.00 },
  { nome:"Sobrepaleta Suína", categoria:"Carne Suína", nivel:"Básico", preco:7.00 },
  { nome:"Alcatra Bovina", categoria:"Carne Bovina", nivel:"Premium", preco:10.00 },
  { nome:"Cupim Bovino Tipo A Especial", categoria:"Carne Bovina", nivel:"Premium", preco:10.00 },
  { nome:"Maminha da Alcatra Bovina", categoria:"Carne Bovina", nivel:"Premium", preco:10.00 },
  { nome:"Picanha Bovina", categoria:"Carne Bovina", nivel:"Premium", preco:12.00 },
  { nome:"Medalhão (Lombinho e Bacon)", categoria:"Carne Bovina", nivel:"Premium", preco:10.00 }
];

const qtd = {}; // nome -> quantidade livre (unidades, sem múltiplo obrigatório)

const $ = (id) => document.getElementById(id);
const fmt = (v) => "R$ " + v.toFixed(2).replace(".", ",");

const cliente = { nome:"", telefone:"", tipoEvento:"", data:"", convidados:"", local:"" };

function extrairCampo(texto, rotulos){
  const linhas = texto.split(/\r?\n/);
  for (const linha of linhas){
    for (const rotulo of rotulos){
      const regex = new RegExp("^\\s*" + rotulo + "\\s*:\\s*(.+?)\\s*$", "i");
      const m = linha.match(regex);
      if (m && m[1]) return m[1].trim();
    }
  }
  return "";
}

function processarColado(){
  const texto = $("f-colado").value;

  // 1ª tentativa: pelos rótulos ("Nome: ...", "Telefone: ...", etc.)
  cliente.nome = extrairCampo(texto, ["nome"]);
  cliente.telefone = extrairCampo(texto, ["telefone", "whatsapp", "contato"]);
  cliente.tipoEvento = extrairCampo(texto, ["tipo de evento", "evento"]);
  cliente.data = extrairCampo(texto, ["data prevista", "data do evento", "data"]);
  cliente.convidados = extrairCampo(texto, ["qtd\\.? de pessoas", "quantidade de pessoas", "n[ºo°]?\\.? de convidados", "convidados", "pessoas"]);
  cliente.local = extrairCampo(texto, ["endere[çc]o do evento", "endere[çc]o", "local"]);

  // 2ª tentativa: reconhecimento livre, pra quando o cliente não usa rótulos
  // (ex: manda só "Jessica" e "20 pessoas" em linhas soltas).
  const linhas = texto.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const usadas = new Set();
  linhas.forEach((linha, i) => { if (linha.includes(":")) usadas.add(i); });

  linhas.forEach((linha, i) => {
    if (usadas.has(i)) return;

    if (!cliente.telefone) {
      const soDigitos = linha.replace(/\D/g, "");
      if (soDigitos.length >= 8 && soDigitos.length <= 13 && soDigitos.length >= linha.length * 0.6) {
        cliente.telefone = linha;
        usadas.add(i);
        return;
      }
    }
    if (!cliente.convidados) {
      const m = linha.match(/(\d+)\s*(pessoas|convidados|pax|convidado)/i);
      if (m) {
        cliente.convidados = m[1];
        usadas.add(i);
        return;
      }
    }
    if (!cliente.data) {
      const m = linha.match(/\b(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|\d{4}-\d{1,2}-\d{1,2})\b/);
      if (m) {
        cliente.data = m[1];
        usadas.add(i);
        return;
      }
    }
  });

  // O que sobrar (primeira linha ainda não usada) vira o nome, se não veio por rótulo.
  if (!cliente.nome) {
    const candidata = linhas.find((l, i) => !usadas.has(i));
    if (candidata) cliente.nome = candidata;
  }

  const previa = $("previa-cliente");
  if (!texto.trim()){
    previa.innerHTML = "";
    renderResumo();
    return;
  }
  previa.innerHTML = `
    <b style="color:var(--brasero-cream);">Entendi assim:</b><br>
    Nome: ${cliente.nome || "<span style=\"color:#ff8a80;\">não identificado</span>"}<br>
    Telefone: ${cliente.telefone || "<span style=\"color:#ff8a80;\">não identificado</span>"}<br>
    Tipo de evento: ${cliente.tipoEvento || "-"}<br>
    Data prevista: ${cliente.data || "-"}<br>
    Qtd. de pessoas: ${cliente.convidados || "-"}<br>
    Endereço: ${cliente.local || "-"}
  `;
  renderResumo();
}
$("f-colado").addEventListener("input", processarColado);

function nomeAtendente(){
  const sel = $("f-atendente").value;
  return sel === "__outro__" ? $("f-atendente-outro").value.trim() : sel;
}

function initAtendente(){
  const salvo = localStorage.getItem("brasero96_atendente") || "";
  const opcoesConhecidas = ["Jessica Nascimento", "Jessica Miranda", "Thiago Xavier", "Diêgo Xavier"];
  if (salvo && opcoesConhecidas.includes(salvo)) {
    $("f-atendente").value = salvo;
  } else if (salvo) {
    $("f-atendente").value = "__outro__";
    $("f-atendente-outro").style.display = "block";
    $("f-atendente-outro").value = salvo;
  }
  $("f-atendente").onchange = () => {
    $("f-atendente-outro").style.display = $("f-atendente").value === "__outro__" ? "block" : "none";
    salvarAtendente();
    renderResumo();
  };
  $("f-atendente-outro").oninput = () => {
    salvarAtendente();
    renderResumo();
  };
}
function salvarAtendente(){
  const nome = nomeAtendente();
  if (nome) localStorage.setItem("brasero96_atendente", nome);
}
initAtendente();

function renderSabores(){
  const container = $("sabores-container");
  container.innerHTML = "";
  const categorias = {};
  SABORES.forEach(s => { (categorias[s.categoria] ||= []).push(s); });

  Object.entries(categorias).forEach(([categoria, itens]) => {
    const h = document.createElement("div");
    h.className = "cat-title";
    h.textContent = categoria;
    container.appendChild(h);

    itens.forEach(s => {
      const row = document.createElement("div");
      row.className = "sabor-row";
      const badgeClass = s.nivel === "Premium" ? "badge-premium" : "badge-basico";
      row.innerHTML = `
        <div class="sabor-info">
          <span class="nome">${s.nome}</span><span class="badge ${badgeClass}">${s.nivel}</span>
          <div class="sabor-preco">${fmt(s.preco)} / espeto</div>
        </div>
        <select class="qty-input" style="width:64px !important;">
          ${[0,5,10,15,20,25,30,35,40,45,50].map(n => `<option value="${n}" ${((qtd[s.nome]||0)===n) ? "selected":""}>${n}</option>`).join("")}
        </select>
      `;
      row.querySelector(".qty-input").onchange = (e) => {
        qtd[s.nome] = parseInt(e.target.value) || 0;
        renderResumo();
      };
      container.appendChild(row);
    });
  });
}

function selecionados(){
  return SABORES
    .filter(s => (qtd[s.nome] || 0) > 0)
    .map(s => ({ nome:s.nome, nivel:s.nivel, unidades:qtd[s.nome], subtotal: qtd[s.nome] * s.preco }));
}

function renderResumo(){
  const itens = selecionados();
  const totalEspetos = itens.reduce((soma, i) => soma + i.unidades, 0);
  const valorEspetinhos = itens.reduce((soma, i) => soma + i.subtotal, 0);
  const valorServico = parseFloat($("f-servico").value) || 0;
  const valorTotal = valorEspetinhos + valorServico;

  const linhasSabores = itens.length
    ? itens.map(i => `<div class="linha"><span>${i.unidades}x ${i.nome} (${i.nivel})</span><span>${fmt(i.subtotal)}</span></div>`).join("")
    : `<div class="vazio">Nenhum sabor selecionado ainda</div>`;

  // Monta o bloco de dados do cliente só com o que foi preenchido de fato —
  // sem mostrar "Cliente"/"Evento"/"Data a combinar" como texto de preenchimento.
  const linha1 = [cliente.nome ? `<b>${cliente.nome}</b>` : "", cliente.telefone].filter(Boolean).join(" · ");
  const linha2 = [cliente.tipoEvento, cliente.convidados ? cliente.convidados + " pessoas" : ""].filter(Boolean).join(" · ");
  const linha3 = [cliente.data, cliente.local].filter(Boolean).join(" · ");
  const linhasCliente = [linha1, linha2, linha3].filter(Boolean).join("<br>");
  const blocoCliente = linhasCliente ? `<div class="resumo-cliente">${linhasCliente}</div>` : "";

  $("resumo").innerHTML = `
    <picture>
      <source srcset="logo.webp" type="image/webp">
      <img src="logo.png" alt="Brasero 96" class="carimbo-resumo">
    </picture>
    <div class="resumo-header"><span class="titulo">🔥 Orçamento Brasero 96</span>${nomeAtendente() ? `<div style="font-size:11px; color:var(--muted); margin-top:2px;">Atendido por ${nomeAtendente()}</div>` : ""}</div>
    ${blocoCliente}
    <div class="resumo-sabores">${linhasSabores}</div>
    <div class="resumo-totais">
      <div class="linha"><span>Total de Espetinhos</span><span>${totalEspetos} espetos</span></div>
      <div class="linha"><span>Valor dos espetinhos</span><span>${fmt(valorEspetinhos)}</span></div>
      <div class="linha"><span>Valor do serviço</span><span>${fmt(valorServico)}</span></div>
      <div class="linha total"><span>Valor total</span><span>${fmt(valorTotal)}</span></div>
    </div>
    <div class="disclaimer">Valores estimados, sujeitos a alteração sem aviso prévio.</div>
  `;
}

function salvarNoHistorico(){
  const itens = selecionados();
  if (!cliente.nome.trim() && itens.length === 0) {
    $("status-salvo").textContent = "Preencha ao menos o nome ou um sabor antes de salvar.";
    $("status-salvo").style.color = "#ff8a80";
    return;
  }
  $("status-salvo").textContent = "Salvando...";
  $("status-salvo").style.color = "var(--muted)";

  const totalEspetos = itens.reduce((soma, i) => soma + i.unidades, 0);
  const valorEspetinhos = itens.reduce((soma, i) => soma + i.subtotal, 0);
  const valorServico = parseFloat($("f-servico").value) || 0;
  const valorTotal = valorEspetinhos + valorServico;
  const saboresTexto = itens.map(i => `${i.unidades}x ${i.nome} (${i.nivel})`).join(" | ");

  const params = new URLSearchParams({
    origem: "manual",
    sessionId: SESSION_ID,
    atendente: nomeAtendente(),
    nome: cliente.nome,
    telefone: cliente.telefone,
    tipoEvento: cliente.tipoEvento,
    data: cliente.data,
    local: cliente.local,
    convidados: cliente.convidados,
    sabores: saboresTexto,
    totalEspetos: totalEspetos,
    valorEspetinhos: valorEspetinhos.toFixed(2),
    valorServico: valorServico.toFixed(2),
    valorTotal: valorTotal.toFixed(2),
    callback: "jsonpCallbackManual"
  });
  window.jsonpCallbackManual = function(resposta){
    if (resposta && resposta.status === "erro") {
      $("status-salvo").textContent = "❌ " + resposta.mensagem;
      $("status-salvo").style.color = "#ff8a80";
    } else {
      $("status-salvo").textContent = "✓ Salvo na planilha às " + new Date().toLocaleTimeString("pt-BR");
      $("status-salvo").style.color = "var(--muted)";
    }
  };
  const script = document.createElement("script");
  script.src = SHEETS_WEBAPP_URL + "?" + params.toString();
  script.onerror = () => {
    $("status-salvo").textContent = "❌ Não foi possível conectar à planilha. Confira a URL do Apps Script.";
    $("status-salvo").style.color = "#ff8a80";
  };
  document.body.appendChild(script);
  setTimeout(() => script.remove(), 8000);
}

function textoParaWhatsapp(){
  const itens = selecionados();
  const totalEspetos = itens.reduce((soma, i) => soma + i.unidades, 0);
  const valorEspetinhos = itens.reduce((soma, i) => soma + i.subtotal, 0);
  const valorServico = parseFloat($("f-servico").value) || 0;
  const valorTotal = valorEspetinhos + valorServico;

  const linhaEvento = [cliente.tipoEvento, cliente.convidados ? cliente.convidados + " pessoas" : ""].filter(Boolean).join(" · ");
  const linhaData = [cliente.data, cliente.local].filter(Boolean).join(" · ");

  const linhas = [
    "🔥 *Orçamento Brasero 96*",
    "",
  ];
  if (cliente.nome) linhas.push(`*Cliente:* ${cliente.nome}`);
  if (cliente.telefone) linhas.push(`*Telefone:* ${cliente.telefone}`);
  if (linhaEvento) linhas.push(`*Evento:* ${linhaEvento}`);
  if (linhaData) linhas.push(`*Data:* ${linhaData}`);
  linhas.push("");
  linhas.push("*Sabores:*");
  linhas.push(...(itens.length
    ? itens.map(i => `- ${i.unidades}x ${i.nome} (${i.nivel}) — ${fmt(i.subtotal)}`)
    : ["Nenhum sabor selecionado ainda"]));
  linhas.push(
    "",
    `Total de Espetinhos: ${totalEspetos} espetos`,
    `Valor dos espetinhos: ${fmt(valorEspetinhos)}`,
    `Valor do serviço: ${fmt(valorServico)}`,
    "",
    `*Valor total: ${fmt(valorTotal)}*`,
    "",
    "_Valores estimados, sujeitos a alteração sem aviso prévio._"
  );
  return linhas.join("\n");
}

function copiarTexto(texto){
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(texto);
  }
  const temp = document.createElement("textarea");
  temp.value = texto;
  temp.style.position = "fixed";
  temp.style.opacity = "0";
  document.body.appendChild(temp);
  temp.select();
  document.execCommand("copy");
  document.body.removeChild(temp);
  return Promise.resolve();
}

$("btn-copiar").onclick = () => {
  copiarTexto(textoParaWhatsapp())
    .then(() => {
      $("status-copiar").textContent = "✓ Texto copiado! Já pode colar no WhatsApp.";
      $("status-copiar").style.color = "var(--muted)";
    })
    .catch(() => {
      $("status-copiar").textContent = "❌ Não foi possível copiar automaticamente. Copie o texto manualmente.";
      $("status-copiar").style.color = "#ff8a80";
    });
};

$("f-servico").addEventListener("input", renderResumo);

$("btn-salvar").onclick = salvarNoHistorico;

$("btn-limpar").onclick = () => {
  if (!confirm("Limpar todos os campos e quantidades pra começar um novo cliente?")) return;
  $("f-colado").value = "";
  Object.assign(cliente, { nome:"", telefone:"", tipoEvento:"", data:"", convidados:"", local:"" });
  $("previa-cliente").innerHTML = "";
  $("f-servico").value = 600;
  Object.keys(qtd).forEach(k => delete qtd[k]);
  SESSION_ID = "manual_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
  $("status-salvo").textContent = "";
  renderSabores();
  renderResumo();
};

renderSabores();
renderResumo();
</script>
